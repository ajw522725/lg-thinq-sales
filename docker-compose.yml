services:
  postgres:
    image: postgres:16-alpine
    container_name: lg-thinq-sales-postgres
    environment:
      POSTGRES_DB: lg_thinq_sales
      POSTGRES_USER: lg_thinq
      POSTGRES_PASSWORD: lg_thinq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: python:3.11-slim
    container_name: lg-thinq-sales-api
    working_dir: /app/apps/api
    environment:
      PYTHONPATH: /app:/app/apps/api
      DEMO_MODE: "true"
      DATABASE_URL: postgresql+psycopg://lg_thinq:lg_thinq@postgres:5432/lg_thinq_sales
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      - postgres

  web:
    image: node:20-alpine
    container_name: lg-thinq-sales-web
    working_dir: /app/apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - api

volumes:
  postgres_data:
